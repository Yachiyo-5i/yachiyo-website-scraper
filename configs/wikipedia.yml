site:
  id: wikipedia
  base_url: https://www.wikipedia.org

defaults:
  headers:
    User-Agent: yachiyo-website-scraper/1.0 (https://github.com/Yachiyo-5i/yachiyo-website-scraper)
    Api-User-Agent: yachiyo-website-scraper/1.0 (https://github.com/Yachiyo-5i/yachiyo-website-scraper)
    Accept: application/json

tasks:
  page_search:
    params:
      lang:
        default: zh
      keyword:
        required: true

    request:
      method: GET
      url: https://{lang}.wikipedia.org/w/api.php
      query:
        action: query
        list: search
        srsearch: "{keyword}"
        srlimit: "5"
        format: json
        formatversion: "2"

    extract:
      type: json
      scope:
        path: "$.query.search.*"
      fields:
        title:
          path: "$.title"
          on_missing: skip_item
        pageid:
          path: "$.pageid"
          type: int
        snippet:
          path: "$.snippet"
        timestamp:
          path: "$.timestamp"

    output:
      type: list
      format:
        title: "{title}"
        pageid: "{pageid}"
        snippet: "{snippet}"
        timestamp: "{timestamp}"

  page_summary:
    params:
      lang:
        default: zh
      title:
        required: true

    request:
      method: GET
      url: https://{lang}.wikipedia.org/api/rest_v1/page/summary/{title}
      accept_status: [404]

    extract:
      type: json
      fields:
        title:
          path: "$.title"
          on_missing: error
        pageid:
          path: "$.pageid"
          type: int
        lang:
          path: "$.lang"
        wikidata_id:
          path: "$.wikibase_item"
        description:
          path: "$.description"
        summary:
          path: "$.extract"
        thumbnail:
          path: "$.thumbnail.source"
        page_url:
          path: "$.content_urls.desktop.page"
        revision:
          path: "$.revision"
        timestamp:
          path: "$.timestamp"

    output:
      type: object
      format:
        title: "{title}"
        pageid: "{pageid}"
        lang: "{lang}"
        wikidata_id: "{wikidata_id}"
        description: "{description}"
        summary: "{summary}"
        thumbnail: "{thumbnail}"
        page_url: "{page_url}"
        revision: "{revision}"
        timestamp: "{timestamp}"

  entity_by_title:
    params:
      lang:
        default: zh
      title:
        required: true

    request:
      method: GET
      url: https://www.wikidata.org/w/api.php
      query:
        action: wbgetentities
        sites: "{lang}wiki"
        titles: "{title}"
        props: labels|descriptions|claims|sitelinks
        languages: zh|ja|en
        format: json
        formatversion: "2"

    extract:
      type: json
      fields:
        wikidata_id:
          path: "$.entities.*.id"
        zh_title:
          path: "$.entities.*.labels.zh.value"
        ja_title:
          path: "$.entities.*.labels.ja.value"
        en_title:
          path: "$.entities.*.labels.en.value"
        zh_description:
          path: "$.entities.*.descriptions.zh.value"
        ja_description:
          path: "$.entities.*.descriptions.ja.value"
        en_description:
          path: "$.entities.*.descriptions.en.value"
        birth_date:
          path: "$.entities.*.claims.P569[0].mainsnak.datavalue.value.time"
          regex: "^\\+([0-9]{4}-[0-9]{2}-[0-9]{2})"
        birth_place_qid:
          path: "$.entities.*.claims.P19[0].mainsnak.datavalue.value.id"
        height_cm:
          path: "$.entities.*.claims.P2048[0].mainsnak.datavalue.value.amount"
          regex: "^\\+?([0-9]+)"
          type: int
        country_qid:
          path: "$.entities.*.claims.P27[0].mainsnak.datavalue.value.id"
        occupation_qid:
          path: "$.entities.*.claims.P106[0].mainsnak.datavalue.value.id"
        x_username:
          path: "$.entities.*.claims.P2002[0].mainsnak.datavalue.value"
        instagram_username:
          path: "$.entities.*.claims.P2003[0].mainsnak.datavalue.value"
        official_website:
          path: "$.entities.*.claims.P856[0].mainsnak.datavalue.value"
        imdb_id:
          path: "$.entities.*.claims.P345[0].mainsnak.datavalue.value"
        commons_category:
          path: "$.entities.*.claims.P373[0].mainsnak.datavalue.value"
        wikidata_image:
          path: "$.entities.*.claims.P18[0].mainsnak.datavalue.value"
        work_period_start:
          path: "$.entities.*.claims.P2031[0].mainsnak.datavalue.value.time"
          regex: "^\\+([0-9]{4})"
        work_period_end:
          path: "$.entities.*.claims.P2032[0].mainsnak.datavalue.value.time"
          regex: "^\\+([0-9]{4})"

    output:
      type: object
      format:
        wikidata_id: "{wikidata_id}"
        zh_title: "{zh_title}"
        ja_title: "{ja_title}"
        en_title: "{en_title}"
        zh_description: "{zh_description}"
        ja_description: "{ja_description}"
        en_description: "{en_description}"
        birth_date: "{birth_date}"
        birth_place_qid: "{birth_place_qid}"
        height_cm: "{height_cm}"
        country_qid: "{country_qid}"
        occupation_qid: "{occupation_qid}"
        x_username: "{x_username}"
        instagram_username: "{instagram_username}"
        official_website: "{official_website}"
        imdb_id: "{imdb_id}"
        commons_category: "{commons_category}"
        wikidata_image: "{wikidata_image}"
        work_period_start: "{work_period_start}"
        work_period_end: "{work_period_end}"

  page_content:
    params:
      lang:
        default: zh
      title:
        required: true

    request:
      method: GET
      url: https://{lang}.wikipedia.org/w/api.php
      query:
        action: parse
        page: "{title}"
        prop: wikitext|externallinks
        format: json
        formatversion: "2"

    extract:
      type: json
      fields:
        title:
          path: "$.parse.title"
        pageid:
          path: "$.parse.pageid"
          type: int
        wikitext:
          path: "$.parse.wikitext"
        external_links:
          path: "$.parse.externallinks.*"
          multiple: true

    output:
      type: object
      format:
        title: "{title}"
        pageid: "{pageid}"
        wikitext: "{wikitext}"
        external_links: "{external_links}"

  page_profile:
    params:
      lang:
        default: zh
      title:
        required: true

    wikipedia:
      config: wikipedia
      lang: zh
